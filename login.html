<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理員登入</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-light">

  <div id="app" class="container mt-5" style="max-width: 400px;">
    <div class="card shadow p-4">
      <h3 class="text-center mb-4">🔐 管理員登入</h3>
      
      <div class="mb-3">
        <input type="password" class="form-control" v-model="password" placeholder="請輸入管理員密碼" @keyup.enter="login">
      </div>
      
      <button class="btn btn-primary w-100" @click="login" :disabled="loading">
        {{ loading ? '登入中...' : '登入' }}
      </button>

      <div class="mt-3 text-center">
        <a href="./index.html" class="text-decoration-none">← 返回首頁</a>
      </div>
    </div>
  </div>

  <script>
    // 請替換成你自己的 Supabase URL 與 Anon Key
    const supabaseUrl = 'YOUR_SUPABASE_URL';
    const supabaseKey = 'YOUR_SUPABASE_ANON_KEY';
    const supabase = supabase.createClient(supabaseUrl, supabaseKey);

    Vue.createApp({
      data() {
        return {
          password: '',
          loading: false
        }
      },
      methods: {
        async login() {
          this.loading = true;
          try {
            // 假設你有一張資料表叫 admin_settings 裡面存著密碼 (請務必加密存入)
            // 這裡示範簡單的比對，實際應用建議使用 Supabase Auth 或加密處理
            const { data, error } = await supabase
              .from('admin_settings')
              .select('password')
              .eq('id', 1)
              .single();

            if (error) throw error;

            if (data && data.password === this.password) {
              localStorage.setItem('is_admin', 'true');
              alert('登入成功！');
              window.location.href = './admin.html';
            } else {
              alert('密碼錯誤');
            }
          } catch (err) {
            console.error(err);
            alert('系統錯誤，請稍後再試');
          } finally {
            this.loading = false;
          }
        }
      }
    }).mount('#app')
  </script>
</body>
</html>
