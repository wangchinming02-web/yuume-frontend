<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>管理員登入</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="/yuume-frontend/js/admin-config.js"></script>
</head>
<body class="bg-light">

  <div id="app" class="container mt-5" style="max-width: 400px;">
    <div class="card shadow p-4">
      <h3 class="text-center mb-4">🔐 管理員登入</h3>

      <div class="mb-3">
        <input type="password" class="form-control" v-model="password" placeholder="請輸入管理員密碼" @keyup.enter="login">
      </div>

      <button class="btn btn-primary w-100" @click="login" :disabled="loading">
        {{ loading ? '登入中...' : '登入' }}
      </button>

      <div class="mt-3 text-center">
        <a href="/yuume-frontend/index.html" class="text-decoration-none">← 返回首頁</a>
      </div>
    </div>
  </div>

  <script>
    const { createApp } = Vue;

    createApp({
      data() {
        return {
          password: '',
          loading: false
        };
      },
      methods: {
        async login() {
          if (!this.password) {
            alert('請輸入密碼');
            return;
          }

          this.loading = true;
          try {
            const response = await fetch(`${API_BASE}/admin-login`, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Accept': 'application/json'
              },
              body: JSON.stringify({ password: this.password })
            });

            const result = await response.json();

            if (response.ok && result.token) {
              localStorage.setItem('admin_token', result.token);
              localStorage.removeItem('is_admin');
              alert('登入成功！');
              window.location.href = siteUrl('admin.html');
            } else {
              alert(result.message || '密碼錯誤');
            }
          } catch (error) {
            console.error(error);
            alert('系統連線異常，請稍後再試');
          } finally {
            this.loading = false;
          }
        }
      }
    }).mount('#app');
  </script>
</body>
</html>
