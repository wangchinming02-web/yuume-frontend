<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>管理員登入</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div id="app" class="container mt-5" style="max-width: 400px;">
    <div class="card shadow p-4">
      <h3 class="text-center">🔐 管理員登入</h3>
      <input type="password" class="form-control my-3" v-model="password" placeholder="請輸入管理員密碼">
      <button class="btn btn-primary w-100" @click="login">登入</button>
    </div>
  </div>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script>
    Vue.createApp({
      data() { return { password: '' } },
      methods: {
        async login() {
          const res = await fetch('http://127.0.0.1:8000/api/admin-login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: this.password })
          });
          
          const data = await res.json();
          
          if (res.ok) {
            // 這裡就是關鍵：把後端傳來的 token 存入瀏覽器，這樣 admin.html 才認得你
            localStorage.setItem('admin_token', 'admin-secret-token'); 
            
            alert('登入成功');
            window.location.href = 'admin.html'; 
          } else {
            alert('密碼錯誤');
          }
        }
      }
    }).mount('#app')
  </script>
</body>
</html>
